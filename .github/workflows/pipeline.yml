name: Pipeline con Entornos

on:
  push:
    branches: [ "main" ]

jobs:
  entornos:
    runs-on: ubuntu-latest

    # ✅ VARIABLES DE ENTORNO
    env:
      ENVIRONMENT: dev

    steps:

    # 1️⃣ Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 2️⃣ Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3️⃣ Mostrar entorno
    - name: Mostrar entorno
      run: echo "Entorno actual: $ENVIRONMENT"

    # 4️⃣ Build
    - name: Build
      run: mvn clean compile

    # 5️⃣ Test
    - name: Test
      run: mvn test

    # ✅ 6️⃣ Condición: Deploy DEV
    - name: Desplegar en DEV
      if: env.ENVIRONMENT == 'dev'
      run: echo "Deploy en entorno DESARROLLO"

    # ✅ 7️⃣ Condición: Deploy TEST
    - name: Desplegar en TEST
      if: env.ENVIRONMENT == 'test'
      run: echo "Deploy en entorno TEST"

    # ✅ 8️⃣ Condición: Deploy PROD
    - name: Desplegar en PROD
      if: env.ENVIRONMENT == 'prod'
      run: echo "Deploy en entorno PRODUCCION"
