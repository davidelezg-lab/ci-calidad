name: Pipeline con SonarCloud

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    #  1. Descargar código
    - name: Checkout
      uses: actions/checkout@v4

    #  2. Instalar Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    #  3. Debug (opcional pero recomendable en clase)
    - name: Ver estructura del proyecto
      run: |
        pwd
        ls -la

    #  4. Compilar
    - name: Compilar proyecto
      run: mvn clean compile

    #  5. Ejecutar tests
    - name: Ejecutar tests JUnit
      run: mvn test

    #  6. Guardar reportes de test
    - name: Subir reportes JUnit
      uses: actions/upload-artifact@v4
      with:
        name: reportes-junit
        path: target/surefire-reports/

    #  7. Análisis con SonarCloud (CORREGIDO)
    - name: Análisis estático SonarCloud
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=davidelezg-lab_ci-calidad \
          -Dsonar.organization=davidelezg-lab \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

    #  8. Generar artefacto
    - name: Generar JAR
      run: mvn package

    #  9. Subir artefacto
    - name: Subir artefacto JAR
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-java
        path: target/*.jar

    #  10. Mensaje final
    - name: Fin pipeline
      run: echo "Pipeline ejecutada correctamente"
