name: Pipeline con Reportes JUnit

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar código
      uses: actions/checkout@v4

    - name: 2. Instalar Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: 3. Compilar
      run: mvn compile

    - name: 4. Ejecutar pruebas JUnit
      run: mvn test

    - name: 5. Ver reportes generados
      run: |
        echo "Reportes generados:"
        ls -la target/surefire-reports

    - name: 6. Subir reportes JUnit como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: reportes-junit
        path: target/surefire-reports/
