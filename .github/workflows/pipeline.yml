name: EJERCICIO 3 — Gestión de entornos

on:
  push:
    branches: [ "main" ]

jobs:
  entornos:
    runs-on: ubuntu-latest
    
    env:
      ENVIRONMENT: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Mostrar entorno
        run: echo "Entorno actual:${{ env.ENVIRONMENT }}"

      - name: Build
        run: mvn clean compile

      - name: Test
        run: mvn test

      # Paso nuevo usando el secret solicitado
      - name: Analizar con SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: echo "Ejecutando análisis de Sonar con el token configurado..."

      # CONDICIÓN CORRECTA (SIN COMILLAS)
      - name: Desplegar en DEV
        if: ${{ env.ENVIRONMENT == 'dev' }}
        run: echo "Deploy en entorno DEV"

      # EJERCICIO 4 (feedback)
      - name: Resultado final
        run: echo "Pipeline completado correctamente"

      # Dejamos la simulación de error al final para que no corte los pasos anteriores
      - name: Simular error
        run: exit 1
