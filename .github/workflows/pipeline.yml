name: Pipeline con Artefactos

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar código
      uses: actions/checkout@v4

    - name: 2. Instalar Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: 3. Compilar y ejecutar pruebas
      run: mvn clean test

    - name: 4. Generar paquete JAR
      run: mvn package

    - name: 5. Ver contenido de target
      run: ls -la target

    - name: 6. Subir JAR como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-java
        path: target/*.jar

    - name: 7. Subir reportes JUnit
      uses: actions/upload-artifact@v4
      with:
        name: reportes-junit
        path: target/surefire-reports/
