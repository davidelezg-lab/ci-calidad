name: Examen Calidad Corregido

on:
  push:
    branches: [ "main" ]

jobs:
  calidad:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Compilar
      run: mvn clean compile

    - name: Ejecutar tests JUnit
      run: mvn test

    - name: Subir reportes JUnit
      uses: actions/upload-artifact@v4
      with:
        name: reportes-junit
        path: target/surefire-reports/

    - name: Generar artefacto JAR
      run: mvn package

    - name: Subir artefacto JAR
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-java
        path: target/*.jar




