name: Pipeline Completa de Calidad

on:
  push:
    branches: [ "main" ]

jobs:
  ci-quality:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout
    - name: 1. Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2️⃣ Java
    - name: 2. Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3️⃣ Debug (opcional)
    - name: 3. Mostrar estructura
      run: |
        echo "Directorio actual:"
        pwd
        echo "Archivos del proyecto:"
        find . -maxdepth 4 -type f

    # 4️⃣ Build + Test + Sonar ✅ (CORRECTO)
    - name: 4. Build + Test + Sonar
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.projectKey=davidelezg-lab_ci-calidad \
          -Dsonar.organization=davidelezg-lab \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # 5️⃣ Guardar reportes
    - name: 5. Guardar reportes JUnit
      uses: actions/upload-artifact@v4
      with:
        name: reportes-junit
        path: target/surefire-reports/

    # 6️⃣ Quality Gate 💥
    - name: 6. Quality Gate
      uses: SonarSource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # 7️⃣ Packaging
    - name: 7. Generar artefacto
      run: mvn package

    # 8️⃣ Publicar artefacto
    - name: 8. Publicar artefacto
      uses: actions/upload-artifact@v4
      with:
        name: aplicacion-java
        path: target/*.jar

    # 9️⃣ Final
    - name: 9. Mensaje final
      run: echo "Pipeline completada correctamente ✅ (si has llegado aquí, Quality Gate OK)"


