name: Pipeline con SonarQube

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar código
      uses: actions/checkout@v4

    - name: 2. Instalar Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: 3. Compilar proyecto
      run: mvn clean compile

    - name: 4. Ejecutar pruebas JUnit
      run: mvn test

    - name: 5. Análisis estático con Sonar
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=ci-calidad \
          -Dsonar.projectName=ci-calidad \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
