name: EJERCICIO 3 — Gestión de entornos

on:
  push:
    branches: [ "main" ]

jobs:
  entornos:
    runs-on: ubuntu-latest

    # ✅ Variable global
    env:
      ENVIRONMENT: dev

    steps:
    # ✅ 1. Siempre primero
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ 2. Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # ✅ 3. Mostrar entorno
    - name: Mostrar entorno
      run: echo "Entorno actual: $ENVIRONMENT"

    # ✅ 4. Build
    - name: Build
      run: mvn clean compile

    # ✅ 5. Test
    - name: Test
      run: mvn test

    # ✅ 6. Condicional DEV
    - name: Desplegar en DEV
      if: env.ENVIRONMENT == 'dev'
      run: echo "Deploy en entorno DEV"

    # ✅ 7. Condicional TEST
    - name: Desplegar en TEST
      if: env.ENVIRONMENT == 'test'
      run: echo "Deploy en entorno TEST"

    # ✅ 8. Condicional PROD
    - name: Desplegar en PROD
      if: env.ENVIRONMENT == 'prod'
      run: echo "Deploy en entorno PROD"
